name: Release

# Builds the production image and pushes it to Docker Hub.
#
# Triggers:
#   - push to `main`        → tags `main` + `main-<short-sha>`
#   - tag `v*` (semver)     → tags `<version>`, `<major>.<minor>`, `<major>`, `latest`
#   - manual (workflow_dispatch)
#
# Required GitHub config (repo Settings → Secrets and variables → Actions):
#   - Variable DOCKERHUB_NAMESPACE (Docker Hub user or org, e.g. "noix")
#   - Variable DOCKERHUB_IMAGE     (repo name, e.g. "club-desk")
#                                  — produces docker.io/$DOCKERHUB_NAMESPACE/$DOCKERHUB_IMAGE
#   - Secret   DOCKERHUB_USERNAME  (Docker Hub username)
#   - Secret   DOCKERHUB_TOKEN     (Docker Hub access token with read/write/delete)
#
# Docker Hub side: create the repository (private if desired), then generate an
# access token under Account Settings → Security with push permissions.

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  release:
    name: Build & push image
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6

      - name: Validate Docker Hub configuration
        run: |
          : "${DOCKERHUB_NAMESPACE:?Variable DOCKERHUB_NAMESPACE is not set}"
          : "${DOCKERHUB_IMAGE:?Variable DOCKERHUB_IMAGE is not set}"
          : "${DOCKERHUB_USERNAME:?Secret DOCKERHUB_USERNAME is not set}"
          : "${DOCKERHUB_TOKEN:?Secret DOCKERHUB_TOKEN is not set}"
        env:
          DOCKERHUB_NAMESPACE: ${{ vars.DOCKERHUB_NAMESPACE }}
          DOCKERHUB_IMAGE: ${{ vars.DOCKERHUB_IMAGE }}
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Compute image tags
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: docker.io/${{ vars.DOCKERHUB_NAMESPACE }}/${{ vars.DOCKERHUB_IMAGE }}
          tags: |
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=main,enable=${{ github.ref == 'refs/heads/main' }}
            type=sha,prefix=main-,enable=${{ github.ref == 'refs/heads/main' }}
          labels: |
            org.opencontainers.image.title=club-desk
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.licenses=MIT

      - name: Build & push
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64
          push: true
          provenance: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Summary
        run: |
          echo "### Pushed image" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Tags:**" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.meta.outputs.tags }}" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Digest:** \`${{ steps.meta.outputs.digest }}\`" >> $GITHUB_STEP_SUMMARY
