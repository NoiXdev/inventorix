name: Release

# Builds the production image and pushes it to Harbor.
#
# Triggers:
#   - push to `main`        → tags `main` + `main-<short-sha>`
#   - tag `v*` (semver)     → tags `<version>`, `<major>.<minor>`, `<major>`, `latest`
#   - manual (workflow_dispatch)
#
# Required GitHub config (repo Settings → Secrets and variables → Actions):
#   - Variable HARBOR_HOST     (e.g. harbor.cloud.noidee.dev)
#   - Variable HARBOR_PROJECT  (e.g. club-desk)
#   - Variable HARBOR_IMAGE    (e.g. app)        — produces $HARBOR_HOST/$HARBOR_PROJECT/$HARBOR_IMAGE
#   - Secret   HARBOR_USERNAME (robot account, e.g. "robot$club-desk+github")
#   - Secret   HARBOR_PASSWORD (robot account secret)
#
# Harbor-side: create a private project, then a robot account scoped to that
# project with `repository: pull, push` permissions.

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  release:
    name: Build & push image
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6

      - name: Validate Harbor configuration
        run: |
          : "${HARBOR_HOST:?Variable HARBOR_HOST is not set}"
          : "${HARBOR_PROJECT:?Variable HARBOR_PROJECT is not set}"
          : "${HARBOR_IMAGE:?Variable HARBOR_IMAGE is not set}"
          : "${HARBOR_USERNAME:?Secret HARBOR_USERNAME is not set}"
          : "${HARBOR_PASSWORD:?Secret HARBOR_PASSWORD is not set}"
        env:
          HARBOR_HOST: ${{ vars.HARBOR_HOST }}
          HARBOR_PROJECT: ${{ vars.HARBOR_PROJECT }}
          HARBOR_IMAGE: ${{ vars.HARBOR_IMAGE }}
          HARBOR_USERNAME: ${{ secrets.HARBOR_USERNAME }}
          HARBOR_PASSWORD: ${{ secrets.HARBOR_PASSWORD }}

      - uses: docker/setup-buildx-action@v4

      - name: Log in to Harbor
        uses: docker/login-action@v4
        with:
          registry: ${{ vars.HARBOR_HOST }}
          username: ${{ secrets.HARBOR_USERNAME }}
          password: ${{ secrets.HARBOR_PASSWORD }}

      - name: Compute image tags
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ vars.HARBOR_HOST }}/${{ vars.HARBOR_PROJECT }}/${{ vars.HARBOR_IMAGE }}
          tags: |
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=main,enable=${{ github.ref == 'refs/heads/main' }}
            type=sha,prefix=main-,enable=${{ github.ref == 'refs/heads/main' }}
          labels: |
            org.opencontainers.image.title=club-desk
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.licenses=MIT

      - name: Build & push
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64
          push: true
          provenance: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Summary
        run: |
          echo "### Pushed image" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Tags:**" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.meta.outputs.tags }}" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Digest:** \`${{ steps.meta.outputs.digest }}\`" >> $GITHUB_STEP_SUMMARY
